# GCP Cloud Build pipeline — builds, pushes, and deploys TRIBE v2 inference server.
#
# Usage:
#   gcloud builds submit \
#     --config services/cognitive-scoring/tribe-inference/cloudbuild.yaml
#
# HF_TOKEN is read directly from Secret Manager (secret name: hf-token).
# No --substitutions needed.

substitutions:
  _REGION: us-central1
  _REPO_NAME: cognarc
  _SERVICE_NAME: tribe-inference
  _IMAGE_TAG: latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/hf-token/versions/latest
      env: HF_TOKEN

steps:
  # Step 1 — Build the Docker image, injecting HF_TOKEN from Secret Manager.
  # secretEnv exposes HF_TOKEN as a real shell env var in this step.
  # We use bash -c so the shell expands $HF_TOKEN before passing to docker.
  - name: gcr.io/cloud-builders/docker
    id: build
    secretEnv: [HF_TOKEN]
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg HF_TOKEN="$HF_TOKEN" \
          --tag $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG \
          --tag $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest \
          --file services/cognitive-scoring/tribe-inference/Dockerfile \
          services/cognitive-scoring/tribe-inference

  # Step 2 — Push both tags to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME
    waitFor: [build]

  # Step 3 — Deploy to Cloud Run with GPU.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG
      - --region
      - $_REGION
      - --platform
      - managed
      - --gpu=1
      - --gpu-type=nvidia-l4
      - --no-gpu-zonal-redundancy
      - --concurrency=1
      - --min-instances=0
      - --memory=16Gi
      - --cpu=4
      - --timeout=300
      - --no-allow-unauthenticated
      - --set-env-vars=HF_HUB_OFFLINE=1
    waitFor: [push]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest
