# GCP Cloud Build pipeline — builds, pushes, and deploys TRIBE v2 inference server.
#
# Usage:
#   gcloud builds submit \
#     --config services/cognitive-scoring/tribe-inference/cloudbuild.yaml \
#     --substitutions _HF_TOKEN=hf_xxx,_PROJECT_ID=my-project
#
# Substitution variables (set via --substitutions or Cloud Build trigger config):
#   _PROJECT_ID    — GCP project ID (defaults to $PROJECT_ID set by Cloud Build)
#   _REGION        — GCP region for Artifact Registry + Cloud Run (default: us-central1)
#   _REPO_NAME     — Artifact Registry repository name (default: cognarc)
#   _SERVICE_NAME  — Cloud Run service name (default: tribe-inference)
#   _HF_TOKEN      — HuggingFace token for pre-downloading model weights
#                    Store as a Cloud Build secret, not a plain substitution in production.

substitutions:
  _REGION: us-central1
  _REPO_NAME: cognarc
  _SERVICE_NAME: tribe-inference
  _IMAGE_TAG: $COMMIT_SHA

options:
  # Machine type: E2_HIGHCPU_8 has enough RAM to download + layer the 8 GB image.
  # Cost: ~$0.016/build-minute. A full build (including model download) takes ~15 min → ~$0.24/build.
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1 — Build the Docker image.
  # HF_TOKEN is passed as a build arg so weights are pre-baked into the image.
  # WARNING: the token value ends up in the image layer history. For production,
  # use a separate model-download step with a mounted secret, then COPY the weights.
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --build-arg
      - HF_TOKEN=$_HF_TOKEN
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest
      - --file
      - services/cognitive-scoring/tribe-inference/Dockerfile
      - services/cognitive-scoring/tribe-inference

  # Step 2 — Push both tags to Artifact Registry.
  # Cost: Artifact Registry storage ~$0.10/GB/month. Image is ~8-9 GB → ~$0.90/month.
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME
    waitFor: [build]

  # Step 3 — Deploy to Cloud Run with GPU.
  #
  # Hardware: NVIDIA L4 GPU, 4 vCPU, 16 GiB RAM.
  # Cost estimate at portfolio scale (scale-to-zero):
  #   - Idle:          $0.00 (min-instances=0, no charge when no traffic)
  #   - Active:        ~$0.00059/vCPU-second + ~$0.00088/GiB-second + GPU surcharge
  #   - L4 GPU:        ~$0.000657/GPU-second
  #   - 100 requests/day × 5s avg → 500 GPU-seconds/day → ~$0.33/day → ~$10/month
  #   - Total with CPU+RAM overhead: ~$20-30/month under portfolio load.
  #
  # concurrency=1: TRIBE inference is GPU-bound; one request at a time per instance.
  # min-instances=0: scale to zero when idle — no charge between demos.
  # max-instances=3: cap spend; never more than 3 concurrent cold starts.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG
      - --region
      - $_REGION
      - --platform
      - managed
      - --gpu=1
      - --gpu-type=nvidia-l4
      - --concurrency=1
      - --min-instances=0
      - --max-instances=3
      - --memory=16Gi
      - --cpu=4
      - --timeout=300
      - --no-allow-unauthenticated
      - --set-env-vars=HF_HUB_OFFLINE=1
    waitFor: [push]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$_IMAGE_TAG
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest
