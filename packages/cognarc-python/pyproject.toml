[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cognarc"
version = "0.1.0"
description = "CognArc cognitive scoring SDK — score AI outputs for cognitive load, comprehension, trust, and manipulation risk"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["cognitive-science", "ai-evaluation", "llm", "scoring", "braintrust", "langfuse"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "httpx>=0.25.0",
  "pydantic>=2.0.0",
]

[project.optional-dependencies]
braintrust = ["braintrust>=0.0.100"]
langfuse = ["langfuse>=2.0.0"]
wandb = ["weave>=0.50.0"]
arize = ["arize-phoenix>=3.0.0"]
dev = [
  "pytest>=7.0.0",
  "pytest-asyncio>=0.21.0",
  "respx>=0.20.0",
  "httpx>=0.25.0",
]

[project.urls]
Homepage = "https://cognarc.ai"
Repository = "https://github.com/cognarc/cognarc"
Documentation = "https://docs.cognarc.ai"

[tool.hatch.build.targets.wheel]
packages = ["cognarc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
